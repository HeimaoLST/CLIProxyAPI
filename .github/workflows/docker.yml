name: Docker Build & Push

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [frontend-updated]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/minervacap2022/cliproxyapi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: minervacap2022/Cli-Proxy-API-Management-Center
          path: _frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: _frontend/package-lock.json

      - name: Build frontend
        run: |
          cd _frontend
          npm ci
          npm run build
          mkdir -p ../panel
          cp dist/index.html ../panel/management.html

      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tags=${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
