services:
  cliproxyapi:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/minervacap2022/cliproxyapi:latest}
    pull_policy: always
    container_name: cliproxyapi
    environment:
      # Plaintext management secret — enables remote management panel access
      # Visit http://your-server:8317/management.html after startup
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:-change-me}
    ports:
      - "${PORT:-8317}:8317"
    volumes:
      # Config persists API keys, model groups, and other settings across restarts
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      # Auth directory for Claude / provider credential files
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      # Optional: persist logs
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped
